name: Publish Kubernetes Image

on:
  pull_request:
    branches:
      - staging
      - main
    types:
      - closed

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.base_ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          find js -name "*.js" -print0 | xargs -0 -n1 node --check
          node --check script.js

      - name: Validate sitemap XML
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const sitemap = fs.readFileSync("sitemap.xml", "utf8");
          const urls = sitemap.match(/<url>/g) || [];

          if (!sitemap.includes("<urlset")) {
            throw new Error("sitemap.xml is missing <urlset>");
          }

          if (urls.length === 0) {
            throw new Error("sitemap.xml has no URLs");
          }

          console.log(`sitemap.xml contains ${urls.length} URLs.`);
          NODE

  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.pull_request.merged == true
    environment:
      name: ${{ github.base_ref == 'main' && 'production' || 'staging' }}
      url: ${{ github.base_ref == 'main' && 'https://www.wapipay.com' || vars.STAGING_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Prepare static release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp -R \
            404.html \
            about.html \
            faq.html \
            index.html \
            privacy.html \
            robots.txt \
            script.js \
            sitemap.xml \
            styles.css \
            terms.html \
            trust.html \
            assets \
            business-payouts \
            contact \
            docs \
            f-a-q \
            faq \
            js \
            otc \
            payment-apis \
            personal-transfers \
            send-money \
            styles \
            vendor \
            dist/

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "environment=${GITHUB_BASE_REF}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.environment }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.image.outputs.sha }}
