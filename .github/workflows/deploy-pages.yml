name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist
          cp *.html styles.css script.js dist/
          cp -r assets vendor styles js dist/
          for dir in send-money personal-transfers business-payouts payment-apis otc contact; do
            if [ -d "$dir" ]; then cp -r "$dir" dist/; fi
          done
          if [ -f robots.txt ]; then cp robots.txt dist/; fi
          if [ -f sitemap.xml ]; then cp sitemap.xml dist/; fi
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
