name: Validate

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches-ignore:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          find js -name "*.js" -print0 | xargs -0 -n1 node --check
          node --check script.js

      - name: Validate sitemap XML
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const sitemap = fs.readFileSync("sitemap.xml", "utf8");
          const urls = sitemap.match(/<url>/g) || [];

          if (!sitemap.includes("<urlset")) {
            throw new Error("sitemap.xml is missing <urlset>");
          }

          if (urls.length === 0) {
            throw new Error("sitemap.xml has no URLs");
          }

          console.log(`sitemap.xml contains ${urls.length} URLs.`);
          NODE

      - name: Validate send-money JSON-LD
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const pages = [];

          function walk(directory) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const fullPath = path.join(directory, entry.name);
              if (entry.isDirectory()) walk(fullPath);
              if (entry.isFile() && entry.name === "index.html") pages.push(fullPath);
            }
          }

          walk("send-money");

          let blockCount = 0;

          for (const page of pages) {
            const html = fs.readFileSync(page, "utf8");
            const blocks = html.match(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/g) || [];

            for (const block of blocks) {
              const json = block
                .replace(/^[\s\S]*?<script type="application\/ld\+json">/, "")
                .replace(/<\/script>[\s\S]*$/, "");

              JSON.parse(json);
              blockCount += 1;
            }
          }

          console.log(`Parsed ${blockCount} JSON-LD blocks across ${pages.length} send-money pages.`);
          NODE
